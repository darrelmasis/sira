<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Sistema Integral para Registro Avícola - funciona sin conexión" />
    <meta name="theme-color" content="#3f9f5a" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SIRA" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>SIRA</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("sira-theme");
          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (theme === "dark" || ((!theme || theme === "system") && systemDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
